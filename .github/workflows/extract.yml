name: APK Extract and Commit

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Clone repository into Universal folder
        shell: pwsh
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git Universal

      - name: Remove .github folder
        shell: pwsh
        run: |
          if (Test-Path "Universal/.github") {
            Remove-Item "Universal/.github" -Recurse -Force
          }

      - name: Download Android.apk
        shell: pwsh
        run: |
          curl.exe -L "https://github.com/isbeh377-web/Geometry-Dash/releases/download/2.2081/com.robtopx.geometryjump_2.2.144_antisplit.apk" -o Android.apk

      - name: Rename APK to ZIP
        shell: pwsh
        run: |
          Rename-Item Android.apk Android.zip

      - name: Extract ZIP into Universal
        shell: pwsh
        run: |
          Expand-Archive -Path Android.zip -DestinationPath Universal -Force

      - name: Remove temporary ZIP
        shell: pwsh
        run: |
          if (Test-Path "Android.zip") {
            Remove-Item "Android.zip" -Force
          }

      - name: Commit and Push Changes
        working-directory: Universal
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes detected"
            exit 0
          }

          git commit -m "Update repository from APK contents"
          git push origin HEAD
